name: Airtable pull (2-way)

# Pull edits/additions made in Airtable back into data.json. Runs every 2 hours
# (plus a manual button). Rows removed in Airtable are mirrored back only when
# they were previously present in the last successful snapshot, which keeps the
# deletion path explicit and guarded. Commits with [skip ci] so it doesn't
# re-trigger the push-sync (the data already matches Airtable).
on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: airtable-pull
  cancel-in-progress: false

jobs:
  pull:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Pull edits from Airtable
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE: ${{ secrets.AIRTABLE_TABLE }}
        run: python3 scripts/airtable_pull.py
      - name: Commit changes (if any)
        run: |
          git add data.json scripts/airtable_snapshot.json
          if git diff --cached --quiet; then
            echo "No Airtable edits to pull."
          else
            git config user.name "watchlist-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "Pull edits from Airtable [skip ci]"
            git push
          fi
