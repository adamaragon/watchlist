name: Airtable backup

# Sync data.json -> Airtable on every change to the list, with a nightly
# safety-net run and a manual button.
on:
  push:
    branches: [main]
    paths: ["data.json"]   # fires within ~1-2 min of any deployed change
  schedule:
    - cron: "17 9 * * *"   # 09:17 UTC daily safety net
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: airtable-backup
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Sync to Airtable
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE: ${{ secrets.AIRTABLE_TABLE }}
        run: python3 scripts/airtable_sync.py
